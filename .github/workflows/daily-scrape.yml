# SmartCart — Daily diff scrape
# ============================================================
# Refresca apenas produtos com verified_at >24h.
# Corre todos os dias às 04h00 Lisboa (03h00 UTC, 04h00 BST).
# Tipicamente termina em <60min.
#
# Lojas funcionais (Playwright directo): Wells, Druni, Sweetcare,
# Farmácia365, Bairro-saude, Easyfarma, Pharma2you, Rituals
#
# Lojas com WAF (via ScrapingBee): Notino, Sephora, Douglas, Atida
#
# Trigger manual: Actions tab → "Daily price scrape" → Run workflow

name: Daily price scrape

on:
  schedule:
    - cron: '0 3 * * *'    # 03h00 UTC = 04h00 Lisboa (winter) / 04h00 (summer)
  workflow_dispatch:        # permite trigger manual no UI

# Permissões mínimas: só queremos escrever no repo (commit de dados)
permissions:
  contents: write

jobs:
  scrape:
    name: Scrape stale prices & rebuild demo
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: |
          npm install playwright jsdom

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Configure ScrapingBee API key
        run: |
          mkdir -p data
          echo "${{ secrets.SCRAPINGBEE_KEY }}" > data/.scrapingbee.key

      - name: Run scrape (diff mode, >24h stale only)
        run: |
          node scripts/scrape-prices.js \
            --use-scrapingbee \
            --max-age=24h \
            --concurrency=3 \
            --delay=2000
        env:
          SCRAPINGBEE_KEY: ${{ secrets.SCRAPINGBEE_KEY }}

      - name: Ingest scraped data into inventories
        run: node scripts/ingest-scraped.js

      # ATENÇÃO: NÃO correr `build-catalog.js` aqui — ele regenera o
      # seed-bundle.json a partir do array PRODUCTS hardcoded (23 entradas),
      # apagando os produtos integrados da Wells/Druni (~2000+ extras).
      # O daily-scrape só refresca preços nas inventories. Para refletir
      # os novos preços no seed-bundle, corremos um price-refresher leve
      # que actualiza store_products in-place sem tocar nos produtos.
      - name: Refresh seed-bundle prices (in-place, preserves integrations)
        run: node scripts/refresh-seed-prices.js

      - name: Re-inject seed into demo.html + index.html
        run: node scripts/inject-seed-into-demo.js

      - name: Inspect summary
        run: |
          if [ -f "data/scraped/$(date -u +%Y-%m-%d)/_summary.json" ]; then
            echo "=== Scrape summary ==="
            cat "data/scraped/$(date -u +%Y-%m-%d)/_summary.json"
          fi

      - name: Commit refreshed data
        run: |
          rm -f data/.scrapingbee.key
          git config user.name "smartcart-bot"
          git config user.email "bot@smartcart.local"
          git add data/inventory demo.html index.html data/seed-bundle.json data/scraped 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: daily price refresh ($(date -u +%Y-%m-%d))"
            # Push directo; rebase contra mesmo branch se push falhar.
            BRANCH="${GITHUB_REF_NAME}"
            pushed=0
            for i in 1 2 3; do
              if git push origin "HEAD:${BRANCH}"; then pushed=1; break; fi
              git fetch origin "${BRANCH}" || true
              if git pull --rebase --autostash origin "${BRANCH}" && git push origin "HEAD:${BRANCH}"; then
                pushed=1; break
              fi
              echo "Falhou tentativa $i, a aguardar 10s..."
              sleep 10
            done
            if [ "$pushed" != "1" ]; then
              echo "ERRO: 3 tentativas falharam"; exit 1
            fi
          fi
