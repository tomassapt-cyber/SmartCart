# SmartCart — Druni full catalog refresh
# ============================================================
# Descobre + scrape + integra catálogo Druni (skincare, hair, fragrance).
# Trigger: manual via UI ou cron semanal (segundas-feiras 05h Lisboa).

name: Druni catalog refresh


on:
  schedule:
    - cron: '0 6 * * *'    # Diário às 06h UTC (queues após Easyfarma das 04h)
  workflow_dispatch:
    inputs:
      category:
        description: 'Categoria (skincare, haircare, fragrance, all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - skincare
          - haircare
          - fragrance
      limit:
        description: 'Limit (vazio = sem limite, útil para teste)'
        required: false
        default: ''
      chunk:
        description: 'Chunk N/M (ex: 1/3, 2/3, 3/3) — corre só uma fatia para reduzir risco'
        required: false
        default: ''

permissions:
  contents: write
jobs:
  catalog:
    name: Discover + scrape + integrate Druni
    runs-on: ubuntu-latest
    timeout-minutes: 300    # 5h max

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Step 1 — Discover URLs
        run: node scripts/discover-druni-catalog.js

      - name: Step 2 — Scrape products
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.category }}" ] && [ "${{ github.event.inputs.category }}" != "all" ]; then
            ARGS="--category=${{ github.event.inputs.category }}"
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit=${{ github.event.inputs.limit }}"
          fi
          if [ -n "${{ github.event.inputs.chunk }}" ]; then
            ARGS="$ARGS --chunk=${{ github.event.inputs.chunk }}"
          fi
          echo "Running: node scripts/scrape-druni-catalog.js $ARGS"
          node scripts/scrape-druni-catalog.js $ARGS --concurrency=3 --delay=1500

      - name: Step 3 — Integrate into seed (fingerprint dedup)
        run: node scripts/integrate-druni-catalog.js

      # Upload artifacts ANTES do commit/push, para que mesmo que o push
      # falhe (rebase conflicts, etc), os dados não sejam perdidos.
      - name: Upload scraped catalog as artifact (4h work safety-net)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: druni-catalog-data
          path: |
            data/catalog/druni-urls.json
            data/catalog/druni-full.json
            data/seed-bundle.json
          retention-days: 30

      - name: Print summary
        run: |
          if [ -f data/catalog/druni-full.json ]; then
            node -e "const d=require('./data/catalog/druni-full.json'); console.log('=== Druni catalog ==='); console.log('Total:', d.products.length); console.log('Stats:', JSON.stringify(d.stats, null, 2));"
          fi

      - name: Commit catalog data + updated seed
        run: |
          git config user.name "smartcart-bot"
          git config user.email "bot@smartcart.local"
          git add -f data/catalog/druni-urls.json data/catalog/druni-full.json data/seed-bundle.json demo.html index.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            CAT="${{ github.event.inputs.category || 'all' }}"
            git commit -m "chore: Druni catalog refresh - $CAT ($(date -u +%Y-%m-%d))"
            # Push directo; só rebaseia contra o MESMO BRANCH se push falhar
            # (não main — rebasing feature branches contra main causa conflitos
            # add/add em todos os ficheiros gerados que já divergem).
            BRANCH="${GITHUB_REF_NAME}"
            # Push com backoff exponencial: até 8 tentativas, jitter aleatório
            # para chunks paralelos não tentarem ao mesmo tempo. Total ~17 min.
            BACKOFFS=(5 15 30 60 120 180 240 300 420 600 900 1200)
            pushed=0
            for i in "${!BACKOFFS[@]}"; do
              attempt=$((i + 1))
              if git push origin "HEAD:${BRANCH}"; then pushed=1; break; fi
              echo "Push falhou (tentativa $attempt), a rebasear contra origin/${BRANCH}..."
              git fetch origin "${BRANCH}" || true
              git rebase --abort 2>/dev/null || true
              if git pull --rebase --autostash origin "${BRANCH}"; then
                if git push origin "HEAD:${BRANCH}"; then pushed=1; break; fi
              else
                git rebase --abort 2>/dev/null || true
                git stash pop 2>/dev/null || true
              fi
              JITTER=$((RANDOM % 10))
              WAIT=$((${BACKOFFS[$i]} + JITTER))
              echo "Falhou tentativa $attempt, a aguardar ${WAIT}s..."
              sleep "$WAIT"
            done
            if [ "$pushed" != "1" ]; then
              echo "ERRO: 12 tentativas falharam — abortando step para tornar visível"
              exit 1
            fi
          fi
