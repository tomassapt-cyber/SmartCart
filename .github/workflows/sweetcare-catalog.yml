# SmartCart — Sweetcare full catalog refresh
# ============================================================
# 2x/dia — preços Sweetcare mudam várias vezes ao longo do dia.
# Cron usa matrix [1/4..4/4] — 4 jobs paralelos, ~2150 produtos cada (~3h/chunk).
# --resume por defeito: checkpoint committed mesmo em timeout → run seguinte continua.
# Commit step usa if:always() → persiste progresso mesmo se scrape falhar/timeout.

name: Sweetcare catalog refresh

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Categoria (skincare, haircare, fragrance, body, makeup, all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - skincare
          - haircare
          - fragrance
          - body
          - makeup
      limit:
        description: 'Limit (vazio = sem limite)'
        required: false
        default: ''
      chunk:
        description: 'Chunk N/M (ex: 1/4, 2/4) — vazio = corre todos em paralelo'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  catalog:
    name: Sweetcare chunk ${{ matrix.chunk }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      fail-fast: false
      matrix:
        chunk:
          - '1/4'
          - '2/4'
          - '3/4'
          - '4/4'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Step 1 — Discover URLs
        run: node scripts/discover-sweetcare-catalog.js

      - name: Step 2 — Scrape products (chunk ${{ matrix.chunk }})
        run: |
          # Se dispatch manual especificou um chunk diferente deste job, skip.
          MANUAL_CHUNK="${{ github.event.inputs.chunk }}"
          MATRIX_CHUNK="${{ matrix.chunk }}"
          if [ -n "$MANUAL_CHUNK" ] && [ "$MANUAL_CHUNK" != "$MATRIX_CHUNK" ]; then
            echo "Skip: dispatch pediu chunk $MANUAL_CHUNK, este job é $MATRIX_CHUNK."
            exit 0
          fi
          # --resume: salta URLs já presentes em sweetcare-full.json (checkpoint)
          # Essencial para scrapes que excedem o timeout — progresso acumulado entre runs.
          ARGS="--chunk=$MATRIX_CHUNK --resume"
          if [ -n "${{ github.event.inputs.category }}" ] && [ "${{ github.event.inputs.category }}" != "all" ]; then
            ARGS="$ARGS --category=${{ github.event.inputs.category }}"
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit=${{ github.event.inputs.limit }}"
          fi
          echo "Running: node scripts/scrape-sweetcare-catalog.js $ARGS --concurrency=3 --delay=1500"
          node scripts/scrape-sweetcare-catalog.js $ARGS --concurrency=3 --delay=1500 || true

      - name: Step 3 — Integrate into seed (fingerprint dedup)
        if: always()
        run: node scripts/integrate-sweetcare-catalog.js || true

      - name: Set chunk slug for artifact name
        if: always()
        id: slug
        run: echo "val=$(echo '${{ matrix.chunk }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload scraped catalog as artifact (safety-net)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweetcare-catalog-data-${{ steps.slug.outputs.val }}
          path: |
            data/catalog/sweetcare-urls.json
            data/catalog/sweetcare-full.json
            data/seed-bundle.json
          retention-days: 30

      - name: Print summary
        run: |
          if [ -f data/catalog/sweetcare-full.json ]; then
            node -e "const d=require('./data/catalog/sweetcare-full.json'); console.log('=== Sweetcare ==='); console.log('Total:', d.products.length); console.log('Stats:', JSON.stringify(d.stats, null, 2));"
          fi

      - name: Commit catalog data + updated seed
        if: always()
        run: |
          git config user.name "smartcart-bot"
          git config user.email "bot@smartcart.local"
          git add -f data/catalog/sweetcare-urls.json data/catalog/sweetcare-full.json data/seed-bundle.json demo.html index.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            CAT="${{ github.event.inputs.category || 'all' }}"
            git commit -m "chore: Sweetcare catalog refresh - $CAT chunk-${{ matrix.chunk }} ($(date -u +%Y-%m-%d))"
            BRANCH="${GITHUB_REF_NAME}"
            BACKOFFS=(5 15 30 60 120 180 240 300 420 600 900 1200)
            pushed=0
            for i in "${!BACKOFFS[@]}"; do
              attempt=$((i + 1))
              if git push origin "HEAD:${BRANCH}"; then pushed=1; break; fi
              echo "Push falhou (tentativa $attempt), a rebasear..."
              git fetch origin "${BRANCH}" || true
              git rebase --abort 2>/dev/null || true
              if git pull --rebase --autostash origin "${BRANCH}"; then
                if git push origin "HEAD:${BRANCH}"; then pushed=1; break; fi
              else
                git rebase --abort 2>/dev/null || true
                git stash pop 2>/dev/null || true
              fi
              JITTER=$((RANDOM % 10))
              WAIT=$((${BACKOFFS[$i]} + JITTER))
              echo "A aguardar ${WAIT}s..."
              sleep "$WAIT"
            done
            if [ "$pushed" != "1" ]; then
              echo "ERRO: 12 tentativas falharam"
              exit 1
            fi
          fi
