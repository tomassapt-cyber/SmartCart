# SmartCart — Sweetcare full catalog refresh
# ============================================================
# Descobre + scrape + integra catálogo Sweetcare (skincare, hair, fragrance, body, makeup).
# Trigger manual via UI ou cron quinzenal (terças 04h Lisboa).
#
# Chunking suportado para reduzir risco de perder 4h+ de scrape.

name: Sweetcare catalog refresh

on:
  schedule:
    - cron: '0 4 * * 2'    # Terça 04h UTC = 05h Lisboa
  workflow_dispatch:
    inputs:
      category:
        description: 'Categoria (skincare, haircare, fragrance, body, makeup, all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - skincare
          - haircare
          - fragrance
          - body
          - makeup
      limit:
        description: 'Limit (vazio = sem limite)'
        required: false
        default: ''
      chunk:
        description: 'Chunk N/M (ex: 1/3) — corre só uma fatia'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  catalog:
    name: Discover + scrape + integrate Sweetcare
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Step 1 — Discover URLs
        run: node scripts/discover-sweetcare-catalog.js

      - name: Step 2 — Scrape products
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.category }}" ] && [ "${{ github.event.inputs.category }}" != "all" ]; then
            ARGS="--category=${{ github.event.inputs.category }}"
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit=${{ github.event.inputs.limit }}"
          fi
          if [ -n "${{ github.event.inputs.chunk }}" ]; then
            ARGS="$ARGS --chunk=${{ github.event.inputs.chunk }}"
          fi
          echo "Running: node scripts/scrape-sweetcare-catalog.js $ARGS"
          node scripts/scrape-sweetcare-catalog.js $ARGS --concurrency=3 --delay=1500

      - name: Step 3 — Integrate into seed (fingerprint dedup)
        run: node scripts/integrate-sweetcare-catalog.js

      - name: Upload scraped catalog as artifact (safety-net)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweetcare-catalog-data
          path: |
            data/catalog/sweetcare-urls.json
            data/catalog/sweetcare-full.json
            data/seed-bundle.json
          retention-days: 30

      - name: Print summary
        run: |
          if [ -f data/catalog/sweetcare-full.json ]; then
            node -e "const d=require('./data/catalog/sweetcare-full.json'); console.log('=== Sweetcare ==='); console.log('Total:', d.products.length); console.log('Stats:', JSON.stringify(d.stats, null, 2));"
          fi

      - name: Commit catalog data + updated seed
        run: |
          git config user.name "smartcart-bot"
          git config user.email "bot@smartcart.local"
          git add -f data/catalog/sweetcare-urls.json data/catalog/sweetcare-full.json data/seed-bundle.json demo.html index.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            CAT="${{ github.event.inputs.category || 'all' }}"
            CHUNK_LABEL=""
            if [ -n "${{ github.event.inputs.chunk }}" ]; then
              CHUNK_LABEL=" chunk-${{ github.event.inputs.chunk }}"
            fi
            git commit -m "chore: Sweetcare catalog refresh - $CAT$CHUNK_LABEL ($(date -u +%Y-%m-%d))"
            BRANCH="${GITHUB_REF_NAME}"
            # Push com backoff exponencial: até 8 tentativas, jitter aleatório
            # para chunks paralelos não tentarem ao mesmo tempo. Total ~17 min.
            BACKOFFS=(5 15 30 60 120 180 240 300)
            pushed=0
            for i in "${!BACKOFFS[@]}"; do
              attempt=$((i + 1))
              if git push origin "HEAD:${BRANCH}"; then pushed=1; break; fi
              git fetch origin "${BRANCH}" || true
              git rebase --abort 2>/dev/null || true
              if git pull --rebase --autostash origin "${BRANCH}"; then
                if git push origin "HEAD:${BRANCH}"; then pushed=1; break; fi
              else
                git rebase --abort 2>/dev/null || true
                git stash pop 2>/dev/null || true
              fi
              JITTER=$((RANDOM % 10))
              WAIT=$((${BACKOFFS[$i]} + JITTER))
              echo "Falhou tentativa $attempt, a aguardar ${WAIT}s..."
              sleep "$WAIT"
            done
            if [ "$pushed" != "1" ]; then
              echo "ERRO: 8 tentativas falharam — abortando step para tornar visível"
              exit 1
            fi
          fi
