# SmartCart — Sweetcare full catalog refresh
# ============================================================
# Descobre + scrape + integra catálogo Sweetcare (skincare, hair, fragrance, body, makeup).
# 2x/dia — preços Sweetcare mudam várias vezes ao longo do dia.
#
# Cron usa matrix [1/2, 2/2] → dois jobs paralelos, cada um ~metade do catálogo.
# Cada job termina em ~2.5h, bem abaixo do limite de 5h.

name: Sweetcare catalog refresh

on:
  schedule:
    # 10h UTC (manhã PT) + 22h UTC (noite PT)
    - cron: '0 10 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Categoria (skincare, haircare, fragrance, body, makeup, all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - skincare
          - haircare
          - fragrance
          - body
          - makeup
      limit:
        description: 'Limit (vazio = sem limite)'
        required: false
        default: ''
      chunk:
        description: 'Chunk N/M (ex: 1/2, 2/2) — vazio = corre ambos em paralelo'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  catalog:
    name: Sweetcare chunk ${{ matrix.chunk }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      fail-fast: false
      matrix:
        chunk: ['1/2', '2/2']
    # Quando workflow_dispatch especifica um chunk concreto, só corre o job
    # cujo matrix.chunk coincide. Schedule e dispatch sem chunk → ambos correm.
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.chunk == '' ||
      github.event.inputs.chunk == matrix.chunk

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Step 1 — Discover URLs
        run: node scripts/discover-sweetcare-catalog.js

      - name: Step 2 — Scrape products (chunk ${{ matrix.chunk }})
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.category }}" ] && [ "${{ github.event.inputs.category }}" != "all" ]; then
            ARGS="--category=${{ github.event.inputs.category }}"
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit=${{ github.event.inputs.limit }}"
          fi
          # Chunk: usa input manual se fornecido, senão usa matrix.chunk
          CHUNK="${{ github.event.inputs.chunk }}"
          if [ -z "$CHUNK" ]; then
            CHUNK="${{ matrix.chunk }}"
          fi
          ARGS="$ARGS --chunk=$CHUNK"
          echo "Running: node scripts/scrape-sweetcare-catalog.js $ARGS"
          node scripts/scrape-sweetcare-catalog.js $ARGS --concurrency=3 --delay=1500

      - name: Step 3 — Integrate into seed (fingerprint dedup)
        run: node scripts/integrate-sweetcare-catalog.js

      - name: Upload scraped catalog as artifact (safety-net)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweetcare-catalog-data-${{ strategy.job-index }}
          path: |
            data/catalog/sweetcare-urls.json
            data/catalog/sweetcare-full.json
            data/seed-bundle.json
          retention-days: 30

      - name: Print summary
        run: |
          if [ -f data/catalog/sweetcare-full.json ]; then
            node -e "const d=require('./data/catalog/sweetcare-full.json'); console.log('=== Sweetcare ==='); console.log('Total:', d.products.length); console.log('Stats:', JSON.stringify(d.stats, null, 2));"
          fi

      - name: Commit catalog data + updated seed
        run: |
          git config user.name "smartcart-bot"
          git config user.email "bot@smartcart.local"
          git add -f data/catalog/sweetcare-urls.json data/catalog/sweetcare-full.json data/seed-bundle.json demo.html index.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            CAT="${{ github.event.inputs.category || 'all' }}"
            CHUNK="${{ github.event.inputs.chunk || matrix.chunk }}"
            git commit -m "chore: Sweetcare catalog refresh - $CAT chunk-$CHUNK ($(date -u +%Y-%m-%d))"
            BRANCH="${GITHUB_REF_NAME}"
            BACKOFFS=(5 15 30 60 120 180 240 300 420 600 900 1200)
            pushed=0
            for i in "${!BACKOFFS[@]}"; do
              attempt=$((i + 1))
              if git push origin "HEAD:${BRANCH}"; then pushed=1; break; fi
              git fetch origin "${BRANCH}" || true
              git rebase --abort 2>/dev/null || true
              if git pull --rebase --autostash origin "${BRANCH}"; then
                if git push origin "HEAD:${BRANCH}"; then pushed=1; break; fi
              else
                git rebase --abort 2>/dev/null || true
                git stash pop 2>/dev/null || true
              fi
              JITTER=$((RANDOM % 10))
              WAIT=$((${BACKOFFS[$i]} + JITTER))
              echo "Falhou tentativa $attempt, a aguardar ${WAIT}s..."
              sleep "$WAIT"
            done
            if [ "$pushed" != "1" ]; then
              echo "ERRO: 12 tentativas falharam — abortando step para tornar visível"
              exit 1
            fi
          fi
