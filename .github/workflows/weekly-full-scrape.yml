# SmartCart — Weekly FULL scrape
# ============================================================
# Refresca TODOS os produtos (ignora --max-age).
# Corre domingos às 03h00 Lisboa (02h00 UTC).
# Tipicamente termina em 2-4h.
#
# Justifica-se semanal porque:
#  - Garante drift correction (preços não refrescados há semanas)
#  - Apanha produtos novos / variantes alteradas
#  - Re-verifica URLs canónicas

name: Weekly full scrape (DEPRECATED — DO NOT RUN)

# ⚠️ DESACTIVADO em 2026-05-24 após este workflow ter DESTRUÍDO o catálogo
# (20.343 produtos → 23). O `scripts/build-catalog.js` que este workflow
# corre regenera o seed-bundle do zero a partir de 23 produtos hardcoded,
# apagando todo o trabalho de integração Druni/Wells/Sweetcare/Easyfarma.
#
# A substituição é o `daily-scrape.yml` (que usa `refresh-seed-prices.js`
# in-place) + os workflows individuais por loja (druni/sweetcare/wells/
# easyfarma-catalog.yml).
#
# Cron removido. Mantemos workflow_dispatch apenas para emergência futura
# E SÓ APÓS o build-catalog.js ser reescrito para in-place refresh.

on:
  # Cron removido. Workflow só executável manualmente — e mesmo assim
  # com PROTECÇÃO: aborta se detectar que destruiria mais de 100 produtos.
  workflow_dispatch:
    inputs:
      i-understand-this-will-destroy-the-catalog:
        description: 'Confirmar destruição (escrever "SIM EU SEI")'
        required: true
        type: string

permissions:
  contents: write

jobs:
  scrape:
    name: Full catalog refresh
    runs-on: ubuntu-latest
    timeout-minutes: 300    # 5h hard cap

    steps:
      - name: Safety check — abort unless user typed exact confirmation
        if: github.event.inputs.i-understand-this-will-destroy-the-catalog != 'SIM EU SEI'
        run: |
          echo "::error::Este workflow está DESACTIVADO. Destruiu 20.343 produtos em 2026-05-24."
          echo "Se realmente queres destruir o catálogo, escreve 'SIM EU SEI' no input."
          exit 1

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install playwright jsdom

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Configure ScrapingBee API key
        run: |
          mkdir -p data
          echo "${{ secrets.SCRAPINGBEE_KEY }}" > data/.scrapingbee.key

      - name: Run FULL scrape (all products, all stores)
        run: |
          node scripts/scrape-prices.js \
            --use-scrapingbee \
            --concurrency=3 \
            --delay=2000
        env:
          SCRAPINGBEE_KEY: ${{ secrets.SCRAPINGBEE_KEY }}

      - name: Ingest scraped data
        run: node scripts/ingest-scraped.js

      - name: Rebuild catalog + demo.html
        run: node scripts/build-catalog.js

      - name: Commit refreshed data
        run: |
          rm -f data/.scrapingbee.key
          git config user.name "smartcart-bot"
          git config user.email "bot@smartcart.local"
          git add data/inventory demo.html data/seed-bundle.json data/products-master.json data/prices-snapshot.json data/scraped 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: weekly full refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
